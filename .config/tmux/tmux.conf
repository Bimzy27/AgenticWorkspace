# Prefix: Ctrl+a (easier than Ctrl+b on most keyboards)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No delay for escape key
set -sg escape-time 0

# Larger history
set -g history-limit 50000

# Focus events (needed for neovim autoread)
set -g focus-events on

# Split panes — keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind '%'

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Copy mode: vi keys
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Status bar
set -g status-position top
set -g status-style 'bg=#1a1b26 fg=#a9b1d6'
set -g status-left '#[fg=#7aa2f7,bold] #S #[fg=#a9b1d6]│ '
set -g status-left-length 40
set -g status-right '#[fg=#565f89]%H:%M #[fg=#a9b1d6]│ #[fg=#9ece6a]#{?client_prefix,⌨ ,}#H '
set -g status-right-length 60

set -g window-status-format '#[fg=#565f89] #I:#W '
set -g window-status-current-format '#[fg=#7aa2f7,bold] #I:#W#{?window_zoomed_flag, ●,} '
set -g window-status-separator ''

# Pane borders
set -g pane-border-style 'fg=#1a1b26'
set -g pane-active-border-style 'fg=#7aa2f7'

# Message style
set -g message-style 'bg=#1a1b26 fg=#7aa2f7'
